<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Generator tekstu na banner</title>
  <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Bangers&family=Chewy&family=Lilita+One&family=Baloo+2:wght@800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #050505;
      --panel: #111;
      --panel-2: #171717;
      --preview-surface: #101722;
      --preview-surface-2: #0b1119;
      --preview-border: #253245;
      --white: #fff7ef;
      --orange: #f3b16b;
      --muted: #989898;
      --border: #2a2a2a;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--white);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: grid;
      grid-template-columns: 390px 1fr;
    }

    aside {
      padding: 22px;
      background: var(--panel);
      border-right: 1px solid var(--border);
      overflow-y: auto;
      max-height: 100vh;
    }

    h1 {
      margin: 0 0 6px;
      font-size: 23px;
      line-height: 1.1;
    }

    .hint {
      color: var(--muted);
      font-size: 13px;
      margin: 0 0 18px;
      line-height: 1.45;
    }

    label {
      display: block;
      margin: 15px 0 6px;
      font-size: 13px;
      color: var(--muted);
    }

    textarea, input, select, button {
      width: 100%;
      border: 1px solid #333;
      border-radius: 12px;
      background: #070707;
      color: var(--white);
      padding: 11px 12px;
      font-size: 14px;
    }

    input[type="range"] { padding: 0; accent-color: var(--orange); }
    input[type="color"] { height: 42px; padding: 4px; }

    textarea { min-height: 130px; resize: vertical; }

    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }

    .button-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 16px; }

    button {
      cursor: pointer;
      background: var(--orange);
      color: #080808;
      font-weight: 850;
      border: none;
      transition: transform .15s ease, opacity .15s ease;
    }

    button:hover { transform: translateY(-1px); }
    button.secondary { background: #262626; color: var(--white); border: 1px solid #393939; }

    .section {
      margin-top: 16px;
      padding: 14px;
      background: var(--panel-2);
      border: 1px solid #252525;
      border-radius: 16px;
    }

    .section-title {
      margin: 0 0 8px;
      font-weight: 850;
      font-size: 14px;
    }

    main {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      padding: 30px;
      overflow: auto;
    }

    .preview-info {
      color: var(--muted);
      font-size: 13px;
      text-align: center;
    }

    .stage-wrap {
      width: min(100%, 1080px);
      display: flex;
      justify-content: center;
      padding: 20px;
      border-radius: 28px;
      background:
        radial-gradient(circle at top, rgba(255,255,255,.05), transparent 52%),
        linear-gradient(180deg, var(--preview-surface), var(--preview-surface-2));
      border: 1px solid var(--preview-border);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.04);
    }

    .canvas {
      position: relative;
      width: 100%;
      max-width: 1050px;
      aspect-ratio: 16 / 9;
      background: #030303;
      border-radius: 0;
      border: 1px solid rgba(255,255,255,.08);
      overflow: hidden;
      box-shadow: 0 24px 80px rgba(0,0,0,.42);
    }

    .banner-image {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      user-select: none;
      pointer-events: none;
    }

    .text-layer {
      position: absolute;
      inset: 0;
      text-align: left;
    }

    .headline {
      position: absolute;
      top: 0;
      left: 0;
      max-width: 100%;
      text-align: left;
      font-family: "Lilita One", "Luckiest Guy", "Baloo 2", Impact, sans-serif;
      font-weight: 900;
      transform: rotate(-2deg);
      font-size: 96px;
      line-height: .92;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--white);
      -webkit-text-stroke: 2px #000;
      text-shadow:
        0 3px 0 #000,
        0 6px 0 #000,
        0 9px 0 #000,
        0 12px 20px rgba(0,0,0,.75);
      white-space: pre-wrap;
      word-break: break-word;
    }

    .accent-word { color: var(--orange); }

    @media (max-width: 950px) {
      body { grid-template-columns: 1fr; }
      aside { max-height: none; border-right: 0; border-bottom: 1px solid var(--border); }
      main { padding: 18px; }
      .headline { font-size: 56px; }
    }
  </style>
</head>
<body>
  <aside>
    <h1>Generator tekstu na banner</h1>
    <p class="hint">Banner jest ustawiony na stałe z pliku banner.png, a pobrany PNG zawsze ma jego rozmiar.</p>

    <div class="section">
      <p class="section-title">1. Tekst generatora</p>
      <label for="text">Tekst</label>
      <textarea id="text">do dogs understand
english?</textarea>

      <label for="coloredWords">Pokolorowane słowa</label>
      <input id="coloredWords" type="text" value="do, understand" placeholder="np. ANIMAL, CONTENT" />

      <div class="row">
        <div>
          <label for="textColor">Kolor tekstu</label>
          <input id="textColor" type="color" value="#efe6dd" />
        </div>
        <div>
          <label for="accentColor">Kolor słów</label>
          <input id="accentColor" type="color" value="#f7b567" />
        </div>
      </div>

      <label for="font">Font</label>
      <select id="font">
        <option value="Luckiest Guy">Luckiest Guy</option>
        <option value="Lilita One">Lilita One</option>
        <option value="Baloo 2">Baloo 2</option>
        <option value="Chewy">Chewy</option>
        <option value="Bangers">Bangers</option>
        <option value="Impact">Impact</option>
      </select>
    </div>

    <div class="section">
      <p class="section-title">2. Ustawienia tekstu</p>
      <label for="size">Rozmiar czcionki: <span id="sizeValue">58</span> px</label>
      <input id="size" type="range" min="20" max="220" value="58" />

      <div class="row-3">
        <div>
          <label for="rotation">Obrót</label>
          <input id="rotation" type="number" value="-6" step="1" />
        </div>
        <div>
          <label for="stroke">Obrys</label>
          <input id="stroke" type="number" value="2" min="0" max="12" />
        </div>
        <div>
          <label for="padding">Margines</label>
          <input id="padding" type="number" value="2" min="0" max="30" />
        </div>
      </div>

      <div class="row">
        <div>
          <label for="positionX">Pozycja X</label>
          <input id="positionX" type="number" value="40" step="1" />
        </div>
        <div>
          <label for="positionY">Pozycja Y</label>
          <input id="positionY" type="number" value="53" step="1" />
        </div>
      </div>
    </div>

    <div class="button-row">
      <button id="download">Pobierz PNG</button>
      <button id="reset" class="secondary">Reset</button>
    </div>
  </aside>

  <main>
    <div class="preview-info" id="previewInfo">Podgląd: 2084 × 427 px</div>
    <div class="stage-wrap">
      <section class="canvas" id="canvas">
        <img class="banner-image" id="bannerImage" alt="Banner tła" />
        <div class="text-layer" id="textLayer">
          <div class="headline" id="headline"></div>
        </div>
      </section>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="banner-data.js"></script>
  <script>
    const BANNER_WIDTH = 2084;
    const BANNER_HEIGHT = 427;
    const BANNER_SRC = window.BANNER_DATA_URL || 'banner.png';

    const els = {
      text: document.getElementById('text'),
      coloredWords: document.getElementById('coloredWords'),
      textColor: document.getElementById('textColor'),
      accentColor: document.getElementById('accentColor'),
      font: document.getElementById('font'),
      size: document.getElementById('size'),
      sizeValue: document.getElementById('sizeValue'),
      rotation: document.getElementById('rotation'),
      stroke: document.getElementById('stroke'),
      padding: document.getElementById('padding'),
      positionX: document.getElementById('positionX'),
      positionY: document.getElementById('positionY'),
      download: document.getElementById('download'),
      reset: document.getElementById('reset'),
      canvas: document.getElementById('canvas'),
      bannerImage: document.getElementById('bannerImage'),
      textLayer: document.getElementById('textLayer'),
      headline: document.getElementById('headline'),
      previewInfo: document.getElementById('previewInfo')
    };

    function escapeHtml(value) {
      return value.replace(/[&<>"']/g, c => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;'
      }[c]));
    }

    function setAspectRatio() {
      els.canvas.style.aspectRatio = BANNER_WIDTH + ' / ' + BANNER_HEIGHT;
      els.previewInfo.textContent = 'Podgląd: ' + BANNER_WIDTH + ' × ' + BANNER_HEIGHT + ' px';
    }

    function renderText() {
      const wordsToColor = els.coloredWords.value
        .split(',')
        .map(word => word.trim().toUpperCase())
        .filter(Boolean);

      els.sizeValue.textContent = els.size.value;
      els.headline.style.fontSize = els.size.value + 'px';
      els.headline.style.fontFamily = '"' + els.font.value + '", Impact, cursive';
      els.headline.style.color = els.textColor.value;
      els.headline.style.webkitTextStroke = els.stroke.value + 'px #000';
      els.headline.style.left = els.positionX.value + 'px';
      els.headline.style.top = els.positionY.value + 'px';
      els.headline.style.transform = 'rotate(' + els.rotation.value + 'deg)';
      els.headline.style.setProperty('--accent', els.accentColor.value);
      document.documentElement.style.setProperty('--orange', els.accentColor.value);
      els.textLayer.style.padding = '0';
      els.headline.style.maxWidth = 'calc(100% - ' + els.positionX.value + 'px - ' + (els.padding.value * 10) + 'px)';

      els.headline.innerHTML = els.text.value
        .toUpperCase()
        .split('\n')
        .map(line => line.split(/(\s+)/).map(part => {
          const clean = part.replace(/[^A-ZĄĆĘŁŃÓŚŹŻ0-9]/gi, '').toUpperCase();
          const safe = escapeHtml(part);
          return wordsToColor.includes(clean)
            ? '<span class="accent-word" style="color:' + els.accentColor.value + '">' + safe + '</span>'
            : safe;
        }).join(''))
        .join('<br>');
    }

    function render() {
      setAspectRatio();
      renderText();
      els.bannerImage.src = BANNER_SRC;
      els.bannerImage.style.objectFit = 'fill';
    }

    function loadImage(src) {
      return new Promise((resolve, reject) => {
        const image = new Image();
        image.onload = () => resolve(image);
        image.onerror = () => reject(new Error('Nie udało się wczytać bannera'));
        image.src = src;
      });
    }

    function getTextRuns(line, accentWords) {
      return line.split(/(\s+)/).map(part => {
        const clean = part.replace(/[^A-ZĄĆĘŁŃÓŚŹŻ0-9]/gi, '').toUpperCase();
        return {
          text: part,
          isAccent: accentWords.includes(clean)
        };
      });
    }

    function getLineMetrics(ctx, line, accentWords) {
      const runs = getTextRuns(line, accentWords);
      let width = 0;

      runs.forEach(run => {
        width += ctx.measureText(run.text).width;
      });

      return { runs, width };
    }

    async function exportBannerFallback() {
      const output = document.createElement('canvas');
      output.width = BANNER_WIDTH;
      output.height = BANNER_HEIGHT;

      const ctx = output.getContext('2d');
      const banner = await loadImage(BANNER_SRC);
      const accentWords = els.coloredWords.value
        .split(',')
        .map(word => word.trim().toUpperCase())
        .filter(Boolean);
      const lines = els.text.value.toUpperCase().split('\n');
      const fontSize = Number(els.size.value) || 58;
      const rotation = (Number(els.rotation.value) || 0) * Math.PI / 180;
      const strokeWidth = Number(els.stroke.value) || 0;
      const paddingPx = (Number(els.padding.value) || 0) * 10;
      const positionX = Number(els.positionX.value) || 0;
      const positionY = Number(els.positionY.value) || 0;
      const lineHeight = fontSize * 0.92;
      const maxWidth = Math.max(0, BANNER_WIDTH - positionX - paddingPx);

      ctx.fillStyle = '#030303';
      ctx.fillRect(0, 0, BANNER_WIDTH, BANNER_HEIGHT);
      ctx.drawImage(banner, 0, 0, BANNER_WIDTH, BANNER_HEIGHT);

      ctx.font = '900 ' + fontSize + 'px "' + els.font.value + '", Impact, sans-serif';
      ctx.textBaseline = 'top';
      ctx.lineJoin = 'round';
      ctx.lineCap = 'round';
      ctx.lineWidth = strokeWidth;

      const metrics = lines.map(line => getLineMetrics(ctx, line, accentWords));
      const textBlockWidth = Math.min(
        maxWidth,
        metrics.reduce((max, item) => Math.max(max, item.width), 0)
      );
      const textBlockHeight = lines.length * lineHeight;

      ctx.save();
      ctx.translate(positionX + textBlockWidth / 2, positionY + textBlockHeight / 2);
      ctx.rotate(rotation);
      ctx.translate(-textBlockWidth / 2, -textBlockHeight / 2);

      metrics.forEach((line, lineIndex) => {
        let cursorX = 0;
        const cursorY = lineIndex * lineHeight;

        line.runs.forEach(run => {
          ctx.shadowColor = 'rgba(0,0,0,.75)';
          ctx.shadowBlur = 20;
          ctx.shadowOffsetX = 0;
          ctx.shadowOffsetY = 12;
          ctx.strokeStyle = '#000000';
          ctx.fillStyle = run.isAccent ? els.accentColor.value : els.textColor.value;
          ctx.strokeText(run.text, cursorX, cursorY);
          ctx.fillText(run.text, cursorX, cursorY);
          cursorX += ctx.measureText(run.text).width;
        });
      });

      ctx.restore();

      const link = document.createElement('a');
      link.download = 'banner-z-tekstem.png';
      link.href = output.toDataURL('image/png');
      link.click();
    }

    async function exportPreviewExactly() {
      if (!window.html2canvas) {
        throw new Error('html2canvas nie jest dostępny');
      }

      const output = await window.html2canvas(els.canvas, {
        backgroundColor: null,
        scale: 1,
        useCORS: true,
        allowTaint: true,
        width: BANNER_WIDTH,
        height: BANNER_HEIGHT,
        windowWidth: BANNER_WIDTH,
        windowHeight: BANNER_HEIGHT
      });

      const link = document.createElement('a');
      link.download = 'banner-z-tekstem.png';
      link.href = output.toDataURL('image/png');
      link.click();
    }

    [
      els.text, els.coloredWords, els.textColor, els.accentColor, els.font, els.size, els.rotation,
      els.stroke, els.padding, els.positionX, els.positionY
    ].forEach(el => {
      el.addEventListener('input', render);
      el.addEventListener('change', render);
    });

    els.download.addEventListener('click', async () => {
      try {
        await document.fonts.ready;
        await exportPreviewExactly();
      } catch (error) {
        console.warn('Eksport 1:1 nie udał się, uruchamiam fallback.', error);

        try {
          await exportBannerFallback();
        } catch (fallbackError) {
          console.error(fallbackError);
          alert('Nie udało się wygenerować PNG. Sprawdź, czy plik banner-data.js lub banner.png jest dostępny obok HTML.');
        }
      }
    });

    els.reset.addEventListener('click', () => {
      els.text.value = 'do dogs understand\nenglish?';
      els.coloredWords.value = 'do, understand';
      els.textColor.value = '#efe6dd';
      els.accentColor.value = '#f7b567';
      els.font.value = 'Lilita One';
      els.size.value = 58;
      els.rotation.value = -6;
      els.stroke.value = 2;
      els.padding.value = 2;
      els.positionX.value = 40;
      els.positionY.value = 53;
      els.font.value = 'Luckiest Guy';
      render();
    });

    render();
  </script>
</body>
</html>
